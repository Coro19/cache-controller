<svg xmlns="http://www.w3.org/2000/svg" width="680" height="880" viewBox="0 0 680 880">
<title>Cache controller FSM — 4-way set-associative write-back with LRU</title>
<desc>11-state one-hot FSM: IDLE, TAG_CMP, READ_HIT, WRITE_HIT, EVICT_CHECK, WRITE_BACK, WB_WAIT, MEM_FETCH, FETCH_WAIT, REFILL, DONE</desc>
<rect width="680" height="880" fill="#ffffff"/>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6b6a64" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .lbl { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
    .name-ctrl { font-size: 14px; font-weight: 500; fill: #444441; }
    .name-hit  { font-size: 14px; font-weight: 500; fill: #085041; }
    .name-miss { font-size: 14px; font-weight: 500; fill: #3c3489; }
    .box-ctrl  { fill: #f1efe8; stroke: #888780; stroke-width: 0.5; }
    .box-hit   { fill: #e1f5ee; stroke: #0f6e56; stroke-width: 0.5; }
    .box-miss  { fill: #eeedfe; stroke: #534ab7; stroke-width: 0.5; }
    .edge      { fill: none; stroke: #6b6a64; stroke-width: 1.5; }
  </style>
</defs>

<!-- initial state indicator -->
<circle cx="340" cy="16" r="5" fill="#7f77dd"/>
<line x1="340" y1="21" x2="340" y2="36" class="edge" marker-end="url(#arr)"/>

<!-- ── state boxes ── -->

<!-- S0 IDLE -->
<rect x="275" y="36" width="130" height="38" rx="6" class="box-ctrl"/>
<text x="340" y="55" text-anchor="middle" dominant-baseline="central" class="name-ctrl">IDLE</text>

<!-- S1 TAG_CMP -->
<rect x="275" y="131" width="130" height="38" rx="6" class="box-ctrl"/>
<text x="340" y="150" text-anchor="middle" dominant-baseline="central" class="name-ctrl">TAG_CMP</text>

<!-- S2 READ_HIT -->
<rect x="45" y="246" width="130" height="38" rx="6" class="box-hit"/>
<text x="110" y="265" text-anchor="middle" dominant-baseline="central" class="name-hit">READ_HIT</text>

<!-- S4 EVICT_CHECK -->
<rect x="275" y="246" width="130" height="38" rx="6" class="box-miss"/>
<text x="340" y="265" text-anchor="middle" dominant-baseline="central" class="name-miss">EVICT_CHECK</text>

<!-- S3 WRITE_HIT -->
<rect x="505" y="246" width="130" height="38" rx="6" class="box-hit"/>
<text x="570" y="265" text-anchor="middle" dominant-baseline="central" class="name-hit">WRITE_HIT</text>

<!-- S5 WRITE_BACK -->
<rect x="505" y="361" width="130" height="38" rx="6" class="box-miss"/>
<text x="570" y="380" text-anchor="middle" dominant-baseline="central" class="name-miss">WRITE_BACK</text>

<!-- S6 WB_WAIT -->
<rect x="505" y="456" width="130" height="38" rx="6" class="box-miss"/>
<text x="570" y="475" text-anchor="middle" dominant-baseline="central" class="name-miss">WB_WAIT</text>

<!-- S7 MEM_FETCH -->
<rect x="275" y="456" width="130" height="38" rx="6" class="box-miss"/>
<text x="340" y="475" text-anchor="middle" dominant-baseline="central" class="name-miss">MEM_FETCH</text>

<!-- S8 FETCH_WAIT -->
<rect x="275" y="551" width="130" height="38" rx="6" class="box-miss"/>
<text x="340" y="570" text-anchor="middle" dominant-baseline="central" class="name-miss">FETCH_WAIT</text>

<!-- S9 REFILL -->
<rect x="275" y="641" width="130" height="38" rx="6" class="box-miss"/>
<text x="340" y="660" text-anchor="middle" dominant-baseline="central" class="name-miss">REFILL</text>

<!-- S10 DONE -->
<rect x="275" y="736" width="130" height="38" rx="6" class="box-ctrl"/>
<text x="340" y="755" text-anchor="middle" dominant-baseline="central" class="name-ctrl">DONE</text>

<!-- ── transitions ── -->

<!-- IDLE self-loop (~req) -->
<path d="M405,46 C440,34 440,76 405,66" class="edge" marker-end="url(#arr)"/>

<!-- IDLE → TAG_CMP -->
<line x1="340" y1="74" x2="340" y2="131" class="edge" marker-end="url(#arr)"/>

<!-- TAG_CMP → READ_HIT -->
<path d="M284,169 C236,210 168,244 110,246" class="edge" marker-end="url(#arr)"/>

<!-- TAG_CMP → EVICT_CHECK -->
<line x1="340" y1="169" x2="340" y2="246" class="edge" marker-end="url(#arr)"/>

<!-- TAG_CMP → WRITE_HIT -->
<path d="M396,169 C444,210 516,244 570,246" class="edge" marker-end="url(#arr)"/>

<!-- READ_HIT → IDLE (L-bend, left rail x=10) -->
<path d="M45,265 L10,265 L10,55 L275,55" class="edge" marker-end="url(#arr)"/>

<!-- WRITE_HIT → IDLE (L-bend, right rail x=655, enters top of IDLE) -->
<path d="M635,265 L655,265 L655,36 L397,36 L397,46" class="edge" marker-end="url(#arr)"/>

<!-- EVICT_CHECK → MEM_FETCH (clean, vertical at x=316) -->
<line x1="316" y1="284" x2="316" y2="456" class="edge" marker-end="url(#arr)"/>

<!-- EVICT_CHECK → WRITE_BACK (dirty) -->
<path d="M405,265 C460,265 570,322 570,361" class="edge" marker-end="url(#arr)"/>

<!-- WRITE_BACK → WB_WAIT -->
<line x1="570" y1="399" x2="570" y2="456" class="edge" marker-end="url(#arr)"/>

<!-- WB_WAIT self-loop (!rdy) -->
<path d="M635,467 C662,455 662,495 635,487" class="edge" marker-end="url(#arr)"/>

<!-- WB_WAIT → MEM_FETCH (mem_rdy) -->
<line x1="505" y1="475" x2="405" y2="475" class="edge" marker-end="url(#arr)"/>

<!-- MEM_FETCH → FETCH_WAIT -->
<line x1="340" y1="494" x2="340" y2="551" class="edge" marker-end="url(#arr)"/>

<!-- FETCH_WAIT self-loop (!rdy) -->
<path d="M405,563 C432,551 432,589 405,581" class="edge" marker-end="url(#arr)"/>

<!-- FETCH_WAIT → REFILL (mem_rdy) -->
<line x1="340" y1="589" x2="340" y2="641" class="edge" marker-end="url(#arr)"/>

<!-- REFILL → DONE -->
<line x1="340" y1="679" x2="340" y2="736" class="edge" marker-end="url(#arr)"/>

<!-- DONE → IDLE (L-bend, left rail x=28) -->
<path d="M275,755 L28,755 L28,45 L275,45" class="edge" marker-end="url(#arr)"/>

<!-- ── transition labels ── -->
<text x="446" y="51" text-anchor="start" class="lbl">~req</text>
<text x="350" y="105" text-anchor="start" class="lbl">req</text>
<text x="185" y="213" text-anchor="middle" class="lbl">hit, !wr</text>
<text x="356" y="210" text-anchor="start" class="lbl">miss</text>
<text x="462" y="213" text-anchor="middle" class="lbl">hit, wr</text>
<text x="323" y="373" text-anchor="start" class="lbl">clean</text>
<text x="468" y="284" text-anchor="middle" class="lbl">dirty</text>
<text x="455" y="466" text-anchor="middle" class="lbl">mem_rdy</text>
<text x="647" y="477" text-anchor="start" class="lbl">!rdy</text>
<text x="411" y="571" text-anchor="start" class="lbl">!rdy</text>
<text x="353" y="616" text-anchor="start" class="lbl">mem_rdy</text>

<!-- ── legend ── -->
<line x1="40" y1="796" x2="640" y2="796" stroke="#d3d1c7" stroke-width="0.5"/>
<rect x="40" y="807" width="12" height="12" rx="3" class="box-ctrl"/>
<text x="60" y="818" class="lbl">S0, S1, S10 — control states (IDLE, tag compare, done)</text>
<rect x="40" y="827" width="12" height="12" rx="3" class="box-hit"/>
<text x="60" y="838" class="lbl">S2, S3 — cache hit path (fast, single-cycle)</text>
<rect x="40" y="847" width="12" height="12" rx="3" class="box-miss"/>
<text x="60" y="858" class="lbl">S4–S9 — cache miss path (eviction → memory fetch → refill)</text>
</svg>
